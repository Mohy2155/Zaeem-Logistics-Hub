<div class="app-workspace">
  <!-- Fixed Executive Sidebar (Locked Dimensions) -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">Z</div>
      <div class="brand-text">
        <h1>ZAEEM</h1>
        <small>Executive Logistics</small>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/portal" routerLinkActive="active" class="nav-item">
        <span class="label">Client Portal</span>
      </a>
      <a routerLink="/admin" routerLinkActive="active" class="nav-item">
        <span class="label">Admin Ledger</span>
      </a>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="label">Operations Dashboard</span>
      </a>
      <a routerLink="/scheduler" routerLinkActive="active" class="nav-item">
        <span class="label">Machinery Scheduler</span>
      </a>
      <a routerLink="/payments" routerLinkActive="active" class="nav-item">
        <span class="label">Payments Portal</span>
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="avatar">AD</div>
        <div class="info">
          <span class="name">Admin User</span>
          <span class="role">System Executive</span>
        </div>
      </div>
      <button *ngIf="isDemoEnvironment" class="btn-text" (click)="resetDemoData()" style="color: #ef4444; width: 100%; text-align: left; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 1rem; cursor: pointer;">
        Reset Demo Data
      </button>
    </div>
  </aside>

  <!-- Main Workspace -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Global Toast Notification System -->
  <div class="toast-overlay" *ngIf="toast$ | async as t" [class.show]="t.show">
    <div class="toast-card" [class.error]="t.isError">
      <span class="toast-message">{{ t.message }}</span>
    </div>
  </div>
</div>
